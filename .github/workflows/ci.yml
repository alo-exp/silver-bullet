name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json templates/silver-bullet.config.json.default package.json; do
            jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
            echo "Valid: $f"
          done

      - name: Check plugin.json version vs latest git tag
        continue-on-error: true
        run: |
          plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$latest_tag" ]]; then
            echo "No git tags found — skipping version check"
            exit 0
          fi
          # Strip leading 'v' from tag for comparison (tags are v0.20.11, plugin.json is 0.20.11)
          tag_version="${latest_tag#v}"
          if [[ "$plugin_version" != "$tag_version" ]]; then
            echo "::warning::plugin.json version ($plugin_version) does not match latest git tag ($latest_tag)"
          else
            echo "plugin.json version ($plugin_version) matches latest tag ($latest_tag)"
          fi

      - name: Check marketplace.json version matches plugin.json
        run: |
          plugin_v=$(jq -r '.version' .claude-plugin/plugin.json)
          market_v=$(jq -r '.plugins[] | select(.name=="silver-bullet") | .version' .claude-plugin/marketplace.json)
          if [[ "$plugin_v" != "$market_v" ]]; then
            echo "::error::Version drift — plugin.json=$plugin_v, marketplace.json=$market_v"
            echo "Run: scripts/sync-marketplace-version.sh before tagging a release"
            exit 1
          fi
          echo "Versions match: $plugin_v"

      - name: Check hook executability
        run: |
          for f in hooks/session-start hooks/*.sh scripts/*.sh; do
            test -x "$f" || { echo "Not executable: $f"; exit 1; }
            echo "Executable: $f"
          done

      - name: Verify hooks.json references exist
        run: |
          jq -r '.. | .command? // empty' hooks/hooks.json | while read -r cmd; do
            # Only check commands that reference plugin scripts via ${CLAUDE_PLUGIN_ROOT}
            # Inline shell commands (e.g. mkdir, rm -f, touch) are skipped
            [[ "$cmd" == *'${CLAUDE_PLUGIN_ROOT}/'* ]] || continue
            # Extract script path relative to hooks/
            script=$(echo "$cmd" | sed 's|"${CLAUDE_PLUGIN_ROOT}/||;s|"||g')
            test -f "$script" || { echo "Missing: $script"; exit 1; }
            echo "Found: $script"
          done

      - name: Check template placeholders
        run: |
          grep -q '{{PROJECT_NAME}}' templates/CLAUDE.md.base || { echo "Missing PROJECT_NAME placeholder"; exit 1; }
          grep -q '{{TECH_STACK}}' templates/CLAUDE.md.base || { echo "Missing TECH_STACK placeholder"; exit 1; }
          grep -q '{{GIT_REPO}}' templates/CLAUDE.md.base || { echo "Missing GIT_REPO placeholder"; exit 1; }
          grep -q '{{ACTIVE_WORKFLOW}}' templates/silver-bullet.md.base || { echo "Missing ACTIVE_WORKFLOW placeholder in silver-bullet.md.base"; exit 1; }
          grep -q '{{PROJECT_NAME}}' templates/silver-bullet.config.json.default || { echo "Missing PROJECT_NAME in config"; exit 1; }
          echo "All placeholders present"

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck --exclude=SC2317,SC1091 hooks/*.sh scripts/*.sh

      - name: Run hook unit tests
        run: |
          sudo apt-get install -y jq git
          for f in tests/hooks/test-*.sh; do bash "$f"; done

      - name: Assert deploy-gate-snippet hardcoded list matches template required_deploy
        run: |
          # deploy-gate-snippet.sh has a hardcoded fallback REQUIRED_DEPLOY string (line ~45).
          # It must stay in sync with templates/silver-bullet.config.json.default required_deploy.
          snippet_list=$(grep '^REQUIRED_DEPLOY=' scripts/deploy-gate-snippet.sh \
            | head -1 | sed 's/^REQUIRED_DEPLOY="//;s/"$//')
          template_list=$(jq -r '.skills.required_deploy | join(" ")' \
            templates/silver-bullet.config.json.default)
          if [[ "$snippet_list" != "$template_list" ]]; then
            echo "ERROR: deploy-gate-snippet.sh hardcoded REQUIRED_DEPLOY drifted from template"
            echo "  snippet : $snippet_list"
            echo "  template: $template_list"
            exit 1
          fi
          echo "deploy-gate-snippet REQUIRED_DEPLOY matches template: $snippet_list"

      - name: Run skill-reference integrity check (CONS-01)
        run: |
          bash tests/integration/test-skill-refs.sh

      - name: Assert required_deploy is subset of all_tracked
        run: |
          # Every skill in required_deploy must also appear in all_tracked.
          # Drift between the two arrays causes completion-audit.sh to gate on skills
          # that are never observed, blocking all deploys silently.
          config=".silver-bullet.json"
          jq empty "$config" || { echo "Invalid JSON: $config"; exit 1; }
          missing=$(jq -r '
            (.skills.required_deploy // []) as $req |
            (.skills.all_tracked // []) as $all |
            $req[] | select(. as $s | $all | map(select(. == $s)) | length == 0)
          ' "$config")
          if [[ -n "$missing" ]]; then
            echo "ERROR: required_deploy skills missing from all_tracked:"
            echo "$missing"
            exit 1
          fi
          req_count=$(jq '.skills.required_deploy | length' "$config")
          all_count=$(jq '.skills.all_tracked | length' "$config")
          echo "required_deploy ($req_count) is a valid subset of all_tracked ($all_count)"

      - name: Check docs/workflows/ parity with templates/workflows/
        run: |
          # docs/workflows/ is the live copy; templates/workflows/ ships to user projects.
          # Drift has caused bugs where SB updated its own workflow but users got stale templates.
          diff_out=$(diff -r --brief docs/workflows/ templates/workflows/ 2>&1 || true)
          if [[ -n "$diff_out" ]]; then
            echo "ERROR: docs/workflows/ and templates/workflows/ have diverged:"
            echo "$diff_out"
            diff -r docs/workflows/ templates/workflows/ || true
            exit 1
          fi
          echo "docs/workflows/ and templates/workflows/ are in sync"

      - name: Lint site HTML (duplicate IDs, structure)
        run: |
          npx --yes html-validate@latest \
            --rule 'no-dup-id:error' \
            --rule 'void-style:off' \
            --rule 'attribute-boolean-style:off' \
            site/**/*.html
